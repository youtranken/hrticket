# Production nginx: terminates TLS for hrticket.pmh.com.vn, serves the SPA,
# and proxies /api to the api container. Mounted over the baked-in default.conf
# via docker-compose.prod.yml (cert + key bind-mounted from ../pmh.com.vn).

# HTTP → HTTPS redirect (session cookie is secure=true in prod → HTTP can't log in).
server {
  listen 80;
  server_name hrticket.pmh.com.vn;
  # Host maps 8080→80 and 8443→443, so the redirect target must carry the public :8443.
  return 301 https://$host:8443$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name hrticket.pmh.com.vn;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/private.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;

  # Security headers (HSTS only makes sense once HTTPS is confirmed working).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API to the api container
  location /api/ {
    client_max_body_size 100m;
    proxy_pass http://api:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
