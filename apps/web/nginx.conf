server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API to the api container
  location /api/ {
    # Bound upload size at the edge: rejects oversized bodies before they reach the API
    # and buffer in memory (G2 anti-OOM), and lifts nginx's 1MB default that would
    # otherwise 413 every attachment over 1MB. Keep in step with HARD_LIMIT_BYTES.
    client_max_body_size 100m;
    proxy_pass http://api:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
