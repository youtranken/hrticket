services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: hris
      POSTGRES_PASSWORD: hris
      POSTGRES_DB: hris
    ports:
      - '5432:5432'
    volumes:
      # PG18+ stores data in a major-version subdir; mount the parent, not /data
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hris -d hris']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025' # SMTP sink
      - '8025:8025' # Web UI (dev/FE-DT)
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025']
      interval: 10s
      timeout: 5s
      retries: 5

  # Dev/test IMAP+SMTP the worker polls — NEVER point the worker at production.
  greenmail:
    image: greenmail/standalone:2.1.0
    environment:
      GREENMAIL_OPTS: '-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.auth.disabled -Dgreenmail.verbose'
    ports:
      - '3025:3025' # SMTP (inject test mail)
      - '3143:3143' # IMAP (worker polls)
      - '3080:8080' # REST API

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ['node', 'dist/main.js']
    env_file: .env
    environment:
      NODE_ENV: production # win over .env (dev) — containers run prod build, no pino-pretty
      DATABASE_URL: postgres://hris:hris@postgres:5432/hris
      API_PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ['node', 'dist/worker.js']
    env_file: .env
    environment:
      NODE_ENV: production # win over .env (dev) — containers run prod build, no pino-pretty
      DATABASE_URL: postgres://hris:hris@postgres:5432/hris
      POLL_INTERVAL_MS: '5000' # fast dev feedback (NFR3 is 60s in prod)
      # Worker polls GreenMail (dev IMAP), distinct test mailboxes per project.
      IMAP_HRIS_HOST: greenmail
      IMAP_HRIS_PORT: '3143'
      IMAP_HRIS_USER: hris@test.local
      IMAP_HRIS_PASSWORD: test
      IMAP_HRIS_SECURE: 'false'
      IMAP_CNB_HOST: greenmail
      IMAP_CNB_PORT: '3143'
      IMAP_CNB_USER: cnb@test.local
      IMAP_CNB_PASSWORD: test
      IMAP_CNB_SECURE: 'false'
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck: # stale imap_poll heartbeat → unhealthy → Docker restarts it (A.4)
      test: ['CMD', 'node', 'dist/cli/worker-healthcheck.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  pgdata:
